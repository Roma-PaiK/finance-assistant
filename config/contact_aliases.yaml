# Contact aliases — maps bank name fragments to contact details.
#
# Why this exists: contacts are saved with nicknames (Amma, Papa) but bank
# statements show legal names (Karkala Roopa Pai → truncated to "Karkala Ro").
# String matching can't bridge this gap — add aliases here as they appear.
#
# Format:
#   - bank_pattern: substring that appears in canonical_merchant (case-insensitive)
#     contact_name: display name (how you know them)
#     relation: self | family | friend | other
#     note: optional context
#
# Add entries when a dry-run shows an unknown merchant that's actually a person.

aliases:
  # ── Self ────────────────────────────────────────────────────────────────────
  - bank_pattern: "Roma Pa"
    contact_name: "Roma Pai"
    relation: self
    note: "Self transfer — Roma Pai K"

  - bank_pattern: "Roma  Pai"
    contact_name: "Roma Pai"
    relation: self

  - bank_pattern: "Roma Can"
    contact_name: "Roma Pai"
    relation: self
    note: "Self — Canara account (IMPS description format)"

  - bank_pattern: "Roma BoB"
    contact_name: "Roma Pai"
    relation: self
    note: "Self — BOB account (IMPS description format)"

  - bank_pattern: "Roma Hdf"
    contact_name: "Roma Pai"
    relation: self
    note: "Self — HDFC account (IMPS description format)"

  # ── Family ──────────────────────────────────────────────────────────────────

  - bank_pattern: "Karkala Su"
    contact_name: "Suresh pai"
    relation: family
    note: "Dad — Karkala Suresh Pai"

  - bank_pattern: "Suresh Pa"
    contact_name: "Suresh pai"
    relation: family
    note: "Dad — may appear without Karkala prefix"

  - bank_pattern: "Karkala T"
    contact_name: "Karkala Tejas Pai"
    relation: family
    note: "Brother — not in VCF, alias needed"

  # ── Friends ─────────────────────────────────────────────────────────────────

  - bank_pattern: "Shreyansh"
    contact_name: "Shreyanshi"
    relation: friend
    note: "Token 'shreya' from Shreya Kumari falsely matches — alias runs first to fix"

  - bank_pattern: "Dave Shau"
    contact_name: "Shaunakali Dave"
    relation: friend
    note: "Contact added to VCF after initial import — alias ensures future imports catch it"

  - bank_pattern: "K K Kalya"
    contact_name: "Kalyaan Gurudev"
    relation: friend
    note: "Initials format — token match can't bridge K K → Kalyaan"
