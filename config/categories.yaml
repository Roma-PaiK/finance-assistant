# Rule-based categorization
# Each category has:
#   hint:     short description shown to LLM to clarify scope (optional)
#   keywords: list of strings matched case-insensitively against transaction description
# First keyword match wins. Order matters — put specific rules before generic ones.

# Categories the LLM is NOT allowed to assign.
# These are set only by flags (is_internal_transfer), YAML keyword rules, or contact match.
llm_excluded:
  - Internal Transfer
  - Internal Transfer — Self
  - Internal Transfer — Other
  - Rent
  - Credit Card Payment
  - EMI & Loan

